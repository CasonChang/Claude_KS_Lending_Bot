# ═══ 策略參數（改這裡就好，不用動程式碼）═══
symbols: [fUSD, fUST]   # 放貸幣別（可多個）：fUSD=美元, fUST=USDT
cycle_minutes: 2        # 每幾分鐘跑一次循環（太長會看不到「成交後馬上被還款」的單）

# 利差提醒（依 research/RESULTS.md 回測結論：長期觀察、極少出手）
# 30 日 MA 利差連續 confirm_days 天都 > min_diff_apy 才推播；頻繁切換會被成本吃掉
rebalance:
  ma_days: 30          # 移動平均天數
  min_diff_apy: 2.0    # 年化利差門檻（百分點）
  confirm_days: 7      # 需連續成立天數
  cooldown_days: 14    # 推播冷卻
  switch_cost_pct: 0.2 # 估計單次轉換成本（算回本天數用）

strategy:
  # 錨點利率 = max(成交IQM, 掛單簿深度利率, min_rate_apy 換算的日利率)
  book_depth_usd: 300000     # 掛單簿前多少美元深度處的利率當參考
  trades_lookback: 120       # 取近幾筆成交算 IQM
  min_rate_apy: 3.0          # 年化低於 3% 寧可不掛（單位：%）

  # 錨點保底：近 N 小時 1h K 收盤的第 P 百分位。
  # 防止市場短暫低迷時整組階梯掛太低、低利成交被卡 2 天
  floor_hours: 24
  # 2026-07-11 調整：25 → 40。學習期發現我們一週成交有 92% 落在「當時錨點以下」
  # （成交利率÷當時錨點 中位 0.92、p90 僅 1.00），常賣在當日低點；子帳戶掛較高照樣成交。
  # 拉高地板 → 軟盤時基準不掉到當日低點。追蹤：成交低於錨點的比例要下降。
  floor_percentile: 40

  # 階梯掛單：weight=資金占比, mult=利率倍率（乘在錨點上）
  # 2026-07-11 調整：頂檔 mult 1.45 → 1.25。學習期發現頂檔錨點×1.45 在軟盤幾乎不成交
  # （一週 172 次掛單、0 成交），那筆錢繞 idle_redeploy 一圈後多在基檔低價成交，
  # 只製造 churn、沒收到溢價。改 1.25 讓它掛得下去、真的鎖住溢價。
  # 追蹤：頂檔(錨點×1.25 附近)填單率要從 ~0 上來；撤單次數(churn)要下降。
  # 註：weight 是「每輪對當下可用資金」的拆法，非最終 book 組成；book 實際仍偏基檔。
  ladder:
    - { weight: 0.50, mult: 1.00 }
    - { weight: 0.30, mult: 1.15 }
    - { weight: 0.20, mult: 1.25 }

  # spike 偵測：近 15 分鐘最高成交利率 > IQM × spike_mult 時觸發
  spike_window_minutes: 15
  spike_mult: 1.8
  spike_discount: 0.95       # spike 時最後一檔掛在 近期最高 × 0.95

  # spike 時改用這組階梯：加重高利率檔位的資金，提高吃到飆漲的量
  spike_ladder:
    - { weight: 0.30, mult: 1.00 }
    - { weight: 0.30, mult: 1.20 }
    - { weight: 0.40, mult: 1.50 }

  # 天期選擇：該檔年化(%) >= apy 就用對應天期（由大到小判斷）
  # 邏輯：15%+ 極佳利率鎖 120 天、10–14% 普通好利率鎖 30 天、10% 以下保持 2 天靈活等更好行情
  periods:
    - { apy: 15, days: 120 }
    - { apy: 10, days: 30 }
    - { apy: 0,  days: 2 }

  # 重掛：掛超過 stale_minutes 未成交、且利率比錨點高 cancel_threshold 以上 → 撤單
  stale_minutes: 10
  cancel_threshold: 0.05     # 5%

  # 平靜期（無 spike）上層檔位掛超過這麼久還沒成交 → 釋出重掛，避免高利檔乾等閒置。
  # 撤掉後下一輪 build_ladder 會把資金重新分配，大部分落到容易成交的最低檔（自然下修）；
  # spike 期間完全不套用（要留著追高）。設 0 = 關閉。設比 stale_minutes 久很多才不會過度 churn。
  idle_redeploy_minutes: 30

  min_offer_usd: 150         # Bitfinex 最小掛單額，勿改低

dry_run:
  simulated_balance: 1000    # DRY_RUN 且沒 API key 時的模擬餘額

telegram:
  daily_report_hour: 9       # 每日收益總結的推播時間（UTC+8）
  notify_spike: true
  notify_fills: true
  notify_closes: true        # 放貸結束（提前還款/到期）通知
